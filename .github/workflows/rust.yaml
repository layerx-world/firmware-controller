name: Rust Linting, Building & Testing

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: ["embassy", "tokio"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Test
        run: >-
          cargo --locked test --workspace --no-default-features
          --features "${{ matrix.backend }}"

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo --locked fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: ["embassy", "tokio"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - name: Catch common mistakes
        run: >-
          cargo --locked clippy --workspace --no-default-features
          --features "${{ matrix.backend }}" -- -D warnings

  doc_build:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Check documentation build
        run: cargo --locked doc --workspace
